services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: minitube-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://host.docker.internal:1433;databaseName=MiniYoutube;encrypt=false;trustServerCertificate=true
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - APP_UPLOAD_DIR=/app/uploads
      - JWT_SECRET=mini_youtube_local_dev_placeholder_secret_key_must_be_at_least_256_bits
    volumes:
      # 自動掛載 .env 中定義的 NAS Samba 共享路徑
      - "${APP_UPLOAD_DIR}:/app/uploads"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: minitube-tunnel
    command: tunnel --url http://app:8080
    restart: always
    depends_on:
      - app
