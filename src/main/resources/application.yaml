spring:
  application:
    name: mini-youtube
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:minitube}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:postgres}}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
  servlet:
    multipart:
      max-file-size: 3072MB
      max-request-size: 12288MB
server:
  # 預設 8080；若外部（如 preview 工具）指定 PORT 環境變數則優先使用
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:mini_youtube_very_secure_secret_key_must_be_long_enough_2026}

app:
  # 影片檔案在本機磁碟的儲存目錄（相對於專案執行目錄，會自動建立）
  upload-dir: uploads/videos
  cookie:
    # 本地開發預設為 false（HTTP 可用），部署至 HTTPS 時設為 true
    secure: ${COOKIE_SECURE:false}
    # 本地開發預設 Lax（同源），部署至跨域 (GitHub Pages→Render) 時設為 None
    same-site: ${COOKIE_SAMESITE:Lax}
